<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ── */
    :root {
      --bg:        #faf7f2;
      --surface:   #f2ede4;
      --card:      #ffffff;
      --border:    #e2d9cc;
      --amber:     #c97a1a;
      --amber-dim: #e8a44a;
      --amber-bg:  #fff4e0;
      --text:      #2a2218;
      --muted:     #7a6e5f;
      --faint:     #cfc5b4;
      --tag-bg:    #eef6ff;
      --tag-text:  #4a7ab5;
      --tag-green-bg:  #edfaf3;
      --tag-green:     #2a8a5a;
      --tag-rose-bg:   #fff0f3;
      --tag-rose:      #b54060;
      --source-bar:#f5f0e8;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-serif:'Libre Baskerville', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .header-title {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--amber);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .header-subtitle {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .search-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-box::placeholder { color: var(--muted); }
    .search-box:focus { border-color: var(--amber-dim); box-shadow: 0 0 0 3px var(--amber-bg); }

    /* ── Sidebar ── */
    aside {
      border-right: 1px solid var(--border);
      background: var(--card);
      padding: 24px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 20px 10px;
    }
    .topic-nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.12s;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
    }
    .topic-nav-item:hover {
      color: var(--text);
      background: var(--surface);
    }
    .topic-nav-item.active {
      color: var(--amber);
      border-left-color: var(--amber);
      background: var(--amber-bg);
    }
    .nav-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      background: var(--surface);
      border-radius: 10px;
      padding: 1px 7px;
    }
    .topic-nav-item.active .nav-count { color: var(--amber); background: #fde8c2; }

    .sidebar-section-gap {
      height: 20px;
    }

    /* ── Main ── */
    main {
      padding: 32px 40px;
      overflow-y: auto;
    }

    /* ── Topic card ── */
    .topic-card {
      margin-bottom: 40px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .topic-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 10px;
    }
    .topic-title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .topic-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    /* Cycle tag colors for fun */
    .tag {
      font-family: var(--font-mono);
      font-size: 10px;
      border-radius: 20px;
      padding: 2px 10px;
      letter-spacing: 0.04em;
      font-weight: 500;
    }
    .tag:nth-child(3n+1) { background: var(--tag-bg);       color: var(--tag-text); }
    .tag:nth-child(3n+2) { background: var(--tag-green-bg); color: var(--tag-green); }
    .tag:nth-child(3n+3) { background: var(--tag-rose-bg);  color: var(--tag-rose); }

    .topic-summary {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
      font-style: italic;
      border-left: 3px solid var(--amber-dim);
      padding-left: 12px;
      max-width: 680px;
    }

    /* ── Source strip ── */
    .sources-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .source-pill {
      background: var(--amber-bg);
      border: 1px solid #f0d9aa;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--amber);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .source-pill .source-type {
      color: var(--amber-dim);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.7;
    }
    .source-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--amber);
      display: inline-block;
    }

    /* ── Takeaway list ── */
    .takeaways {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .takeaway {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .takeaway:last-child { border-bottom: none; }
    .takeaway:hover { background: var(--amber-bg); }

    /* ── Headline row (always visible) ── */
    .takeaway-header {
      padding: 13px 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }    .takeaway-chevron {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--faint);
      transition: transform 0.18s ease, color 0.15s;
    }
    .takeaway.open .takeaway-chevron {
      transform: rotate(90deg);
      color: var(--amber);
    }
    .takeaway-headline {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }
    .takeaway.open .takeaway-headline { color: var(--amber); }

    .takeaway-sources {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      min-width: 0;
    }
    .takeaway-source-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--amber-dim);
      white-space: nowrap;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Multi-source = slightly stronger signal */
    .takeaway-source-tag.multi { color: var(--amber); font-weight: 500; }

    /* ── Expanded detail ── */
    .takeaway-detail {
      display: none;
      padding: 0 18px 14px 44px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
      border-top: 1px dashed var(--border);
      padding-top: 12px;
      cursor: text;
      user-select: text;
    }
    .takeaway.open .takeaway-detail { display: block; }
    .takeaway-detail strong {
      color: var(--amber);
      font-weight: 700;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 28px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-num {
      font-family: var(--font-mono);
      font-size: 22px;
      color: var(--amber);
      font-weight: 500;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Empty / filtered ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* ── Instructions callout ── */
    .callout {
      background: var(--amber-bg);
      border: 1px solid #f0d9aa;
      border-left: 3px solid var(--amber);
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 32px;
      font-size: 13px;
      color: var(--muted);
      max-width: 700px;
    }
    .callout strong { color: var(--text); }
    .callout code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: rgba(200,120,20,0.12);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--amber);
    }

    /* ── Source pill ── */
    .source-pill {
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .source-pill:hover {
      background: #fde8c2;
      border-color: var(--amber-dim);
      box-shadow: 0 1px 4px rgba(201,122,26,0.15);
    }
    .source-pill.active-filter {
      background: var(--amber);
      color: #fff;
      border-color: var(--amber);
    }
    .source-pill.active-filter .source-type { color: rgba(255,255,255,0.65); }
    .source-pill.active-filter .source-dot  { background: #fff; }

    /* ── Filter banner ── */
    .filter-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--amber-bg);
      border: 1px solid #f0d9aa;
      border-left: 3px solid var(--amber);
      border-radius: 6px;
      padding: 10px 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--muted);
    }
    .filter-banner strong { color: var(--text); }
    .filter-clear {
      margin-left: auto;
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--amber-dim);
      border-radius: 12px;
      padding: 3px 12px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--amber);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .filter-clear:hover { background: var(--amber); color: #fff; border-color: var(--amber); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }

    /* ── Highlight search match ── */
    mark {
      background: #ffe08a;
      color: var(--text);
      border-radius: 2px;
      padding: 0 2px;
    }

    @media (max-width: 700px) {
      .shell { grid-template-columns: 1fr; }
      aside { display: none; }
      main { padding: 20px 16px; }
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <span class="header-title">Knowledge Base</span>
    <span class="header-subtitle">/ personal research log</span>
    <div class="header-right">
      <input class="search-box" type="text" id="search" placeholder="Search takeaways…" />
    </div>
  </header>

  <aside id="sidebar">
    <div class="sidebar-label">Topics</div>
    <!-- filled by JS -->
  </aside>

  <main id="main">
    <!-- filled by JS -->
  </main>

</div>

<script>
// ── App state ────────────────────────────────────────────────────────────────
let _allTopics = [];
let _indexData  = null;
let _activeFilter = null;  // { topicId, sourceId, source } | null

// ── Data layer ───────────────────────────────────────────────────────────────
const topicCache = {};   // id → full topic object once fetched

async function loadIndex() {
  try {
    const res = await fetch('./index.json');
    if (!res.ok) throw new Error('not found');
    return await res.json();
  } catch {
    return { meta: { title: "Knowledge Base", updated: "" }, topics: [] };
  }
}

async function loadTopic(stub) {
  if (topicCache[stub.id]) return topicCache[stub.id];
  try {
    const res = await fetch('./' + stub.file);
    if (!res.ok) throw new Error('not found');
    const topic = await res.json();
    topicCache[stub.id] = topic;
    return topic;
  } catch {
    return null;
  }
}

async function loadAllTopics(index) {
  return Promise.all(index.topics.map(s => loadTopic(s)));
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');
  return escapeHtml(text).replace(re, '<mark>$1</mark>');
}

// Bold anything between colons at start, numbers with units, parenthetical labels
function formatPoint(text, query) {
  let out = highlight(text, query);
  // Bold dose numbers like "3–5g", "20g", "8 weeks"
  out = out.replace(/(\b\d+[\u2013\-]?\d*\s?(?:g|mg|kg|lb|%|weeks?|days?|months?|hours?|min)\b)/g, '<strong>$1</strong>');
  return out;
}

// ── Source filter ────────────────────────────────────────────────────────────
function takeawayMatchesSource(tw, source) {
  return tw.sources.some(s => {
    // "AI Wealth 101 – Speaker" starts with source title
    if (s.startsWith(source.title)) return true;
    // "DCEO – PersonName" where PersonName appears in source title
    const dash = s.indexOf(' – ');
    if (dash !== -1) {
      const speaker = s.slice(dash + 3);
      if (speaker.length > 2 && source.title.includes(speaker)) return true;
    }
    return false;
  });
}

function setSourceFilter(topicId, sourceId) {
  const topic = topicCache[topicId];
  if (!topic) return;
  const source = topic.sources.find(s => s.id === sourceId);
  if (!source) return;
  // Toggle off if same pill clicked again
  if (_activeFilter && _activeFilter.topicId === topicId && _activeFilter.sourceId === sourceId) {
    clearSourceFilter();
    return;
  }
  _activeFilter = { topicId, sourceId, source };
  applySourceFilter();
}

function clearSourceFilter() {
  _activeFilter = null;
  const main = document.getElementById('main');
  main.innerHTML =
    renderStats(_indexData, _allTopics) +
    renderCallout() +
    _allTopics.filter(Boolean).map(t => renderTopic(t, '')).join('');
  document.getElementById('search').value = '';
}

function renderFilterBanner(source) {
  return `
    <div class="filter-banner">
      <span>Source filter: <strong>${escapeHtml(source.outlet)} — ${escapeHtml(source.title)}</strong></span>
      <button class="filter-clear" onclick="clearSourceFilter()">✕ clear filter</button>
    </div>`;
}

function applySourceFilter() {
  const { source } = _activeFilter;
  const main = document.getElementById('main');
  const filtered = _allTopics.filter(Boolean).map(t => {
    const matching = t.takeaways.filter(tw => takeawayMatchesSource(tw, source));
    return matching.length > 0 ? { ...t, takeaways: matching } : null;
  }).filter(Boolean);

  if (filtered.length === 0) {
    main.innerHTML = renderFilterBanner(source) +
      `<div class="empty-state">No takeaways found for this source.</div>`;
    return;
  }
  main.innerHTML = renderFilterBanner(source) +
    filtered.map(t => renderTopic(t, '')).join('');
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderSidebar(stubs, activeId) {
  const sidebar = document.getElementById('sidebar');
  const label = sidebar.querySelector('.sidebar-label');
  sidebar.innerHTML = '';
  sidebar.appendChild(label);

  stubs.forEach(stub => {
    const topic = topicCache[stub.id];
    const count = topic ? topic.takeaways.length : '…';
    const a = document.createElement('a');
    a.className = 'topic-nav-item' + (stub.id === activeId ? ' active' : '');
    a.href = '#' + stub.id;
    a.innerHTML = `
      <span>${escapeHtml(stub.title)}</span>
      <span class="nav-count">${count}</span>
    `;
    sidebar.appendChild(a);
  });
}

function renderStats(index, loadedTopics) {
  const totalTakeaways = loadedTopics.reduce((n, t) => n + (t ? t.takeaways.length : 0), 0);
  const totalSources   = loadedTopics.reduce((n, t) => n + (t ? t.sources.length : 0), 0);
  return `
    <div class="stats-bar">
      <div class="stat"><span class="stat-num">${index.topics.length}</span><span class="stat-label">Topics</span></div>
      <div class="stat"><span class="stat-num">${totalTakeaways}</span><span class="stat-label">Takeaways</span></div>
      <div class="stat"><span class="stat-num">${totalSources}</span><span class="stat-label">Sources</span></div>
      ${index.meta.updated ? `<div class="stat"><span class="stat-num" style="font-size:14px;padding-top:4px">${escapeHtml(index.meta.updated)}</span><span class="stat-label">Last updated</span></div>` : ''}
    </div>`;
}

function renderCallout() {
  return `
    <div class="callout">
      <strong>Adding content:</strong> Ask Claude to extract takeaways in the topic JSON format,
      then use Claude Code to add the file to <code>topics/</code>, update <code>index.json</code>, and push to GitHub.
      Existing takeaway IDs are preserved; new ones are appended.
    </div>`;
}

function renderTopicSkeleton(stub) {
  return `
    <div class="topic-card" id="${escapeHtml(stub.id)}">
      <div class="topic-header">
        <h2 class="topic-title">${escapeHtml(stub.title)}</h2>
      </div>
      <div class="takeaways" style="padding:24px;color:var(--muted);font-size:13px;font-family:var(--font-mono)">Loading…</div>
    </div>`;
}

function renderTopic(topic, query) {
  const sourcesHtml = topic.sources.map(s => {
    const isActive = _activeFilter && _activeFilter.topicId === topic.id && _activeFilter.sourceId === s.id;
    return `
    <div class="source-pill${isActive ? ' active-filter' : ''}"
         onclick="setSourceFilter('${topic.id}', '${s.id}')"
         title="Filter takeaways by this source">
      <span class="source-dot"></span>
      <span>${escapeHtml(s.outlet)} — ${escapeHtml(s.title)}</span>
      <span class="source-type">${escapeHtml(s.type)}</span>
      ${s.date ? `<span style="color:var(--faint);font-size:10px">${escapeHtml(s.date)}</span>` : ''}
    </div>`;
  }).join('');

  const tagsHtml = topic.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');

  const takeawaysHtml = topic.takeaways.map(tw => {
    const multiSource = tw.sources.length > 1;
    const sourceTags = tw.sources.map(s =>
      `<span class="takeaway-source-tag${multiSource ? ' multi' : ''}">${escapeHtml(s)}</span>`
    ).join('');

    const headline = tw.headline
      ? highlight(tw.headline, query)
      : highlight(tw.point.split('.')[0], query);

    const detail = formatPoint(tw.point, query);

    return `
    <div class="takeaway">
      <div class="takeaway-header" onclick="toggleTakeaway(this.parentElement)">
        <svg class="takeaway-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 4 10 8 6 12"/>
        </svg>
        <span class="takeaway-headline">${headline}</span>
        <div class="takeaway-sources">${sourceTags}</div>
      </div>
      <div class="takeaway-detail">${detail}</div>
    </div>`;
  }).join('');

  return `
    <div class="topic-card" id="${escapeHtml(topic.id)}">
      <div class="topic-header">
        <h2 class="topic-title">${highlight(topic.title, query)}</h2>
        <div class="topic-tags">${tagsHtml}</div>
      </div>
      ${topic.summary ? `<p class="topic-summary">${highlight(topic.summary, query)}</p>` : ''}
      <div class="sources-strip">${sourcesHtml}</div>
      <div class="takeaways">${takeawaysHtml}</div>
    </div>`;
}

// ── Accordion toggle ─────────────────────────────────────────────────────────
function toggleTakeaway(el) {
  const isOpen = el.classList.contains('open');
  const siblings = el.parentElement.querySelectorAll('.takeaway');
  siblings.forEach(s => s.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  const index = await loadIndex();

  document.title = index.meta.title || 'Knowledge Base';
  document.querySelector('.header-title').textContent = index.meta.title || 'Knowledge Base';

  // Render sidebar immediately from stubs (no takeaway counts yet)
  renderSidebar(index.topics, null);

  // Render skeleton cards so the layout is ready for IntersectionObserver
  const main = document.getElementById('main');
  main.innerHTML = index.topics.map(s => renderTopicSkeleton(s)).join('');

  // Fetch each topic when its skeleton scrolls into view
  const cardObserver = new IntersectionObserver(async entries => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const id = entry.target.id;
      const stub = index.topics.find(s => s.id === id);
      if (!stub || topicCache[id]) continue;
      cardObserver.unobserve(entry.target);
      const topic = await loadTopic(stub);
      if (!topic) return;
      // Replace skeleton with full card
      const el = document.getElementById(id);
      if (el) el.outerHTML = renderTopic(topic, '');
      // Update sidebar count now that we have the data
      renderSidebar(index.topics, null);
    }
  }, { rootMargin: '200px' });

  index.topics.forEach(s => {
    const el = document.getElementById(s.id);
    if (el) cardObserver.observe(el);
  });

  // Render stats bar once all topics are loaded
  const allTopics = await loadAllTopics(index);
  _allTopics = allTopics;
  _indexData  = index;
  // Re-render main with full data (no query)
  main.innerHTML =
    renderStats(index, allTopics) +
    renderCallout() +
    allTopics.filter(Boolean).map(t => renderTopic(t, '')).join('');
  renderSidebar(index.topics, null);

  // Sidebar highlight on scroll
  const scrollObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        document.querySelectorAll('.topic-nav-item').forEach(a => a.classList.remove('active'));
        const link = document.querySelector(`.topic-nav-item[href="#${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { threshold: 0.3 });

  allTopics.filter(Boolean).forEach(t => {
    const el = document.getElementById(t.id);
    if (el) scrollObserver.observe(el);
  });

  // Search — requires all topics loaded (already done above)
  let debounce;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      _activeFilter = null;  // clear source filter when user searches
      const q = e.target.value.trim();
      if (!q) {
        main.innerHTML =
          renderStats(index, allTopics) +
          renderCallout() +
          allTopics.filter(Boolean).map(t => renderTopic(t, '')).join('');
        renderSidebar(index.topics, null);
        allTopics.filter(Boolean).forEach(t => {
          const el = document.getElementById(t.id);
          if (el) scrollObserver.observe(el);
        });
        return;
      }

      const ql = q.toLowerCase();
      const filtered = allTopics.filter(Boolean).map(t => {
        const topicMatch =
          t.title.toLowerCase().includes(ql) ||
          t.tags.some(tag => tag.toLowerCase().includes(ql)) ||
          (t.summary && t.summary.toLowerCase().includes(ql)) ||
          t.sources.some(s => s.title.toLowerCase().includes(ql) || s.outlet.toLowerCase().includes(ql));
        if (topicMatch) return t;
        const matchingTakeaways = t.takeaways.filter(tw =>
          (tw.headline && tw.headline.toLowerCase().includes(ql)) ||
          tw.point.toLowerCase().includes(ql) ||
          tw.sources.some(s => s.toLowerCase().includes(ql))
        );
        return matchingTakeaways.length > 0 ? { ...t, takeaways: matchingTakeaways } : null;
      }).filter(Boolean);

      if (filtered.length === 0) {
        main.innerHTML = `<div class="empty-state">No results for "${escapeHtml(q)}"</div>`;
        return;
      }

      main.innerHTML = filtered.map(t => renderTopic(t, q)).join('');
      renderSidebar(index.topics, null);
      filtered.forEach(t => {
        const el = document.getElementById(t.id);
        if (el) scrollObserver.observe(el);
      });
    }, 180);
  });
})();
</script>
</body>
</html>
